name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v5
    
    - name: Cache Swift build artifacts
      uses: actions/cache@v5
      with:
        path: .build
        key: ${{ runner.os }}-swift-dmg-${{ hashFiles('**/Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-swift-dmg-
    
    - name: Detect Python version
      run: |
        if command -v python3.12 &> /dev/null; then
          echo "PYTHON_CMD=python3.12" >> $GITHUB_ENV
        elif command -v python3.11 &> /dev/null; then
          echo "PYTHON_CMD=python3.11" >> $GITHUB_ENV
        elif command -v python3.10 &> /dev/null; then
          echo "PYTHON_CMD=python3.10" >> $GITHUB_ENV
        else
          echo "Error: Python 3.10+ is required"
          exit 1
        fi
    
    - name: Import signing certificate
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        MACOS_KEYCHAIN_PWD: ${{ secrets.MACOS_KEYCHAIN_PWD }}
      run: |
        # Skip silently when secrets are not yet configured
        if [[ -z "${MACOS_CERTIFICATE}" ]]; then
          echo "⚠️  MACOS_CERTIFICATE secret not set — skipping certificate import. Code signing will be skipped."
          exit 0
        fi

        # Decode the certificate to a temp file
        echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/build.p12

        # Create a fresh temporary keychain
        security create-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$MACOS_KEYCHAIN_PWD" build.keychain

        # Import the certificate
        security import /tmp/build.p12 \
          -k build.keychain \
          -P "$MACOS_CERTIFICATE_PWD" \
          -T /usr/bin/codesign \
          -T /usr/bin/productsign

        # Allow codesign to access the key without a UI prompt
        security set-key-partition-list \
          -S apple-tool:,apple: \
          -s -k "$MACOS_KEYCHAIN_PWD" build.keychain

        # Include the system keychain so trust chains resolve
        security list-keychains -d user -s build.keychain login.keychain

        # Clean up temp file
        rm /tmp/build.p12

        echo "✅ Certificate imported into ephemeral keychain"

    - name: Build DMG
      run: bash build-dmg.sh
      env:
        PYTHON_CMD: ${{ env.PYTHON_CMD }}
        SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
    
    - name: Notarize DMG
      continue-on-error: true
      env:
        NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
        NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        NOTARIZATION_PWD: ${{ secrets.NOTARIZATION_PWD }}
      run: |
        # Skip when notarization secrets are not configured
        if [[ -z "${NOTARIZATION_APPLE_ID}" ]]; then
          echo "⚠️  NOTARIZATION_APPLE_ID secret not set — skipping notarization."
          exit 0
        fi

        DMG_PATH=(.build/MarkyMarkdown-*.dmg)
        DMG_PATH="${DMG_PATH[0]}"
        if [[ ! -f "${DMG_PATH}" ]]; then
          echo "❌ DMG not found at ${DMG_PATH} — cannot notarize."
          exit 1
        fi
        echo "🔏 Submitting ${DMG_PATH} for notarization..."
        xcrun notarytool submit "${DMG_PATH}" \
          --apple-id "$NOTARIZATION_APPLE_ID" \
          --team-id "$NOTARIZATION_TEAM_ID" \
          --password "$NOTARIZATION_PWD" \
          --wait

        echo "📎 Stapling notarization ticket to DMG..."
        xcrun stapler staple "${DMG_PATH}"
        echo "✅ Notarization complete"

    - name: Get version from tag
      id: get_version
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        echo "TAG=${TAG}" >> $GITHUB_OUTPUT
        echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
    
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: .build/MarkyMarkdown-*.dmg
        body: |
          # MarkyMarkdown ${{ steps.get_version.outputs.TAG }}
          
          ## Features
          - 🎉 Menu bar integration with drag-and-drop support
          - ✨ Celebratory messages for every conversion
          - 🎊 Milestone tracking at 10, 50, and 100 conversions
          - 🤔 Playful, context-aware error messages
          - 🔥 Zero prerequisites—MarkItDown CLI bundled in the app
          
          ## System Requirements
          - macOS 13.0 or later
          - Apple Silicon (arm64)
          
          ## Installation
          1. Download `MarkyMarkdown-${{ steps.get_version.outputs.VERSION }}.dmg`
          2. Open the DMG and drag the app to Applications
          3. Launch from Applications or Spotlight
          
          No additional setup or dependencies required!
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
