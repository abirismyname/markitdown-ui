name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to build from
        required: false
        default: main
      tag:
        description: Release tag (e.g. v1.2.3)
        required: true
        type: string
      staple:
        description: Staple notarization ticket to DMG
        required: false
        type: boolean
        default: true
      draft:
        description: Create release as draft
        required: false
        type: boolean
        default: false
      prerelease:
        description: Mark release as prerelease
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-notarize:
    name: Build and Notarize
    uses: ./.github/workflows/notarization.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      app_version: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      staple: ${{ github.event_name == 'workflow_dispatch' && inputs.staple || true }}
      artifact_name: release-artifacts
      upload_artifacts: true
    secrets: inherit

  create-release:
    name: Create GitHub Release
    needs: build-and-notarize
    runs-on: ubuntu-latest
    steps:
    - name: Download notarized artifacts
      uses: actions/download-artifact@v7
      with:
        name: release-artifacts
        path: .

    - name: Debug downloaded artifacts
      run: |
        echo "Artifact files after download:"
        find . -maxdepth 4 -type f | sort

    - name: Resolve release DMG
      id: release_dmg
      run: |
        DMG_NAME="${{ needs.build-and-notarize.outputs.dmg_name }}"
        if [[ -z "$DMG_NAME" ]]; then
          echo "❌ DMG name was not provided by the build job"
          exit 1
        fi
        DMG_PATH=$(find . -type f -name "$DMG_NAME" | head -1)
        if [[ -z "$DMG_PATH" || ! -f "$DMG_PATH" ]]; then
          echo "❌ DMG not found: $DMG_NAME"
          echo "Downloaded files:"
          find . -maxdepth 4 -type f | sort
          exit 1
        fi
        echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
        echo "Using DMG: $DMG_PATH"

    - name: Get version from tag
      id: get_version
      run: |
        if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
          TAG="${{ inputs.tag }}"
        else
          TAG="${GITHUB_REF#refs/tags/}"
        fi

        if [[ -z "${TAG}" ]]; then
          echo "❌ Release tag is required"
          exit 1
        fi

        # Normalize: add 'v' prefix if missing
        if [[ "${TAG}" != v* ]]; then
          echo "⚠️  Tag '${TAG}' is missing the 'v' prefix — normalizing to 'v${TAG}'"
          TAG="v${TAG}"
        fi

        echo "TAG=${TAG}" >> $GITHUB_OUTPUT
        echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
    
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.get_version.outputs.TAG }}
        target_commitish: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
        files: ${{ steps.release_dmg.outputs.path }}
        body: |
          # MarkyMarkdown ${{ steps.get_version.outputs.TAG }}
          
          ## Features
          - 🎉 Menu bar integration with drag-and-drop support
          - ✨ Celebratory messages for every conversion
          - 🎊 Milestone tracking at 10, 50, and 100 conversions
          - 🤔 Playful, context-aware error messages
          - 🔥 Zero prerequisites—MarkItDown CLI bundled in the app
          
          ## System Requirements
          - macOS 13.0 or later
          - Apple Silicon (arm64)
          
          ## Installation
          1. Download `MarkyMarkdown-${{ steps.get_version.outputs.VERSION }}.dmg`
          2. Open the DMG and drag the app to Applications
          3. Launch from Applications or Spotlight
          
          No additional setup or dependencies required!
        draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
        prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-appcast:
    name: Update Appcast
    needs: [build-and-notarize, create-release]
    runs-on: macos-15
    permissions:
      contents: write
      pull-requests: write
    steps:
    - name: Checkout main branch
      uses: actions/checkout@v5
      with:
        ref: main
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download release artifacts
      uses: actions/download-artifact@v7
      with:
        name: release-artifacts
        path: /tmp/release-artifacts

    - name: Resolve DMG path
      id: dmg
      run: |
        DMG_NAME="${{ needs.build-and-notarize.outputs.dmg_name }}"
        DMG_PATH=$(find /tmp/release-artifacts -name "$DMG_NAME" | head -1)
        echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
        echo "Using DMG: $DMG_PATH"

    - name: Get version
      id: version
      run: |
        if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
          TAG="${{ inputs.tag }}"
        else
          TAG="${GITHUB_REF#refs/tags/}"
        fi
        TAG="${TAG#v}"
        echo "version=$TAG" >> "$GITHUB_OUTPUT"

    - name: Download Sparkle tools
      run: |
        SPARKLE_VERSION="2.9.1"
        curl -fsSL \
          "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
          -o /tmp/sparkle.tar.xz
        mkdir -p /tmp/sparkle-tools
        tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle-tools ./bin/sign_update
        chmod +x /tmp/sparkle-tools/bin/sign_update

    - name: Sign DMG and update appcast
      env:
        SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        DMG_PATH: ${{ steps.dmg.outputs.path }}
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        if [[ -z "${SPARKLE_ED_PRIVATE_KEY}" ]]; then
          echo "⚠️  SPARKLE_ED_PRIVATE_KEY secret not set — skipping appcast update."
          echo "   See README.md § 'Sparkle Update Keys' to set this up."
          exit 0
        fi

        DMG_SIZE=$(stat -f%z "${DMG_PATH}")
        DOWNLOAD_URL="https://github.com/abirismyname/markymarkdown/releases/download/v${VERSION}/$(basename "${DMG_PATH}")"
        PUB_DATE=$(date -R)

        # Write private key to a temp file — macOS sign_update does not accept
        # "-" as a stdin alias for --ed-key-file, so a real path is required.
        SPARKLE_KEY_FILE=$(mktemp)
        chmod 600 "$SPARKLE_KEY_FILE"
        printf '%s' "${SPARKLE_ED_PRIVATE_KEY}" > "$SPARKLE_KEY_FILE"

        # Generate EdDSA signature
        if ! ED_SIGNATURE=$(/tmp/sparkle-tools/bin/sign_update "${DMG_PATH}" --ed-key-file "$SPARKLE_KEY_FILE"); then
          rm -f "$SPARKLE_KEY_FILE"
          echo "❌ sign_update failed — verify that SPARKLE_ED_PRIVATE_KEY is a valid EdDSA private key."
          exit 1
        fi
        rm -f "$SPARKLE_KEY_FILE"

        NEW_ITEM=$(cat <<ITEM
        <item>
          <title>Version ${VERSION}</title>
          <pubDate>${PUB_DATE}</pubDate>
          <sparkle:releaseNotesLink>
            https://github.com/abirismyname/markymarkdown/releases/tag/v${VERSION}
          </sparkle:releaseNotesLink>
          <enclosure
            url="${DOWNLOAD_URL}"
            sparkle:version="${VERSION}"
            sparkle:shortVersionString="${VERSION}"
            length="${DMG_SIZE}"
            type="application/octet-stream"
            sparkle:edSignature="${ED_SIGNATURE}" />
        </item>
        ITEM
        )

        # Insert the new item before the closing </channel> tag
        python3 - <<PYEOF
        import re, sys
        with open('docs/appcast.xml', 'r') as f:
            content = f.read()
        new_item = """${NEW_ITEM}"""
        content = content.replace('  </channel>', new_item + '\n\n  </channel>')
        with open('docs/appcast.xml', 'w') as f:
            f.write(content)
        print("✅ appcast.xml updated")
        PYEOF

    - name: Commit updated appcast
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if git diff --quiet docs/appcast.xml; then
          echo "ℹ️  No appcast changes to commit (SPARKLE_ED_PRIVATE_KEY may not be set)."
        else
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="chore/appcast-v${VERSION}"
          git checkout -b "$BRANCH"
          git add docs/appcast.xml
          git commit -m "chore: update appcast for v${VERSION}"
          git push --force-with-lease origin "$BRANCH"
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --json number --jq 'length')
          if [[ "$EXISTING_PR" -eq 0 ]]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore: update appcast for v${VERSION}" \
              --body "Automated appcast update for release v${VERSION}."
            echo "✅ appcast.xml PR created for branch $BRANCH"
          else
            echo "ℹ️  PR already exists for branch $BRANCH — branch updated."
          fi
        fi
