name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA) to build from
        required: false
        default: main
      tag:
        description: Release tag (e.g. v1.2.3)
        required: true
        type: string
      staple:
        description: Staple notarization ticket to DMG
        required: false
        type: boolean
        default: true
      draft:
        description: Create release as draft
        required: false
        type: boolean
        default: false
      prerelease:
        description: Mark release as prerelease
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-notarize:
    name: Build and Notarize
    uses: ./.github/workflows/notarization.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      staple: ${{ github.event_name == 'workflow_dispatch' && inputs.staple || true }}
      artifact_name: release-artifacts
      upload_artifacts: true
    secrets: inherit

  create-release:
    name: Create GitHub Release
    needs: build-and-notarize
    runs-on: ubuntu-latest
    steps:
    - name: Download notarized artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-artifacts
        path: .

    - name: Debug downloaded artifacts
      run: |
        echo "Artifact files after download:"
        find . -maxdepth 4 -type f | sort

    - name: Resolve release DMG
      id: release_dmg
      run: |
        DMG_NAME="${{ needs.build-and-notarize.outputs.dmg_name }}"
        if [[ -z "$DMG_NAME" ]]; then
          echo "❌ DMG name was not provided by the build job"
          exit 1
        fi
        DMG_PATH=$(find . -type f -name "$DMG_NAME" | head -1)
        if [[ -z "$DMG_PATH" || ! -f "$DMG_PATH" ]]; then
          echo "❌ DMG not found: $DMG_NAME"
          echo "Downloaded files:"
          find . -maxdepth 4 -type f | sort
          exit 1
        fi
        echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"
        echo "Using DMG: $DMG_PATH"

    - name: Get version from tag
      id: get_version
      run: |
        if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
          TAG="${{ inputs.tag }}"
        else
          TAG="${GITHUB_REF#refs/tags/}"
        fi

        if [[ -z "${TAG}" ]]; then
          echo "❌ Release tag is required"
          exit 1
        fi

        if [[ "${TAG}" != v* ]]; then
          echo "❌ Release tag must start with 'v' (for example: v1.2.3)"
          exit 1
        fi

        echo "TAG=${TAG}" >> $GITHUB_OUTPUT
        echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT
    
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.TAG }}
        target_commitish: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
        files: ${{ steps.release_dmg.outputs.path }}
        body: |
          # MarkyMarkdown ${{ steps.get_version.outputs.TAG }}
          
          ## Features
          - 🎉 Menu bar integration with drag-and-drop support
          - ✨ Celebratory messages for every conversion
          - 🎊 Milestone tracking at 10, 50, and 100 conversions
          - 🤔 Playful, context-aware error messages
          - 🔥 Zero prerequisites—MarkItDown CLI bundled in the app
          
          ## System Requirements
          - macOS 13.0 or later
          - Apple Silicon (arm64)
          
          ## Installation
          1. Download `MarkyMarkdown-${{ steps.get_version.outputs.VERSION }}.dmg`
          2. Open the DMG and drag the app to Applications
          3. Launch from Applications or Spotlight
          
          No additional setup or dependencies required!
        draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
        prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
