name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Swift Tests
    runs-on: macos-15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Cache Swift build artifacts
      uses: actions/cache@v4
      with:
        path: .build
        key: ${{ runner.os }}-swift-${{ hashFiles('**/Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-swift-
    
    - name: Install MarkItDown CLI for integration tests
      run: |
        pip3 install --break-system-packages "markitdown[all]" || pip3 install "markitdown[all]"
        echo "markitdown path: $(which markitdown || echo 'not found in PATH')"
    
    - name: Run tests
      run: swift test --verbose
    
    - name: Build for testing
      run: swift build --configuration debug
