name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Swift Tests
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v5
    
    - name: Cache Swift build artifacts
      uses: actions/cache@v5
      with:
        path: .build
        key: ${{ runner.os }}-swift-${{ hashFiles('**/Package.swift') }}
        restore-keys: |
          ${{ runner.os }}-swift-
    
    - name: Install MarkItDown CLI for integration tests
      run: |
        python3 -m venv .venv
        .venv/bin/pip install --quiet "markitdown[all]"
        echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"
        echo "markitdown path: ${{ github.workspace }}/.venv/bin/markitdown"
    
    - name: Run tests
      run: swift test --verbose
    
    - name: Build for testing
      run: swift build --configuration debug
